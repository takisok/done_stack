<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Done Stack ✨ 積み上げろ！</title>
  <meta name="theme-color" content="#1f1f1f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Done Stack">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>


<header class="app-header">
  <div class="header-inner">
    <span class="header-title">Done Stack ✨</span>
    <div class="header-menu">
      <button class="menu-btn" id="menuBtn">⚙ 設定</button>
      <div class="menu-dropdown" id="menuDropdown">
        <a class="menu-item" href="history.html">活動ログ</a>
        <button class="menu-item" id="driveSyncBtn">Google Drive と同期</button>
        <button class="menu-item" id="importCsvBtn">CSV を読み込み</button>
        <button class="menu-item" id="exportCsvBtn">CSV として出力</button>
      </div>
    </div>
  </div>
</header>

<div class="app">
  <div class="top-status-row">
    <div class="llm-status" id="llmStatus" data-state="checking">
      <span class="llm-dot"></span><span class="llm-label">LLM 確認中…</span>
    </div>
    <div class="drive-status" id="driveStatus" data-state="off">Drive 未接続</div>
  </div>

  <!-- ── ステージ（キャラクター + カウンター） ── -->
  <div class="stage">

    <!-- 左：マスコット -->
    <div class="char-col">
      <div class="bubble mascot-bubble" id="mascotBubble">…ふーん</div>
      <img class="char-img mascot-img" src="img/mascot/keytan.png" alt="丸くてもふもふの体に大きな目と長くてもふもふのしっぽがついたキーたん" width="160" height="160">
    </div>

    <!-- 中央：カウンター -->
    <div class="counter-col">
      <div class="counter-label">達成数</div>
      <div class="counter-num" id="counterNum">0</div>
    </div>

    <!-- 右：メイドさん -->
    <div class="char-col maid-char-col">
      <div class="bubble maid-bubble" id="maidBubble">今日も一緒に頑張りましょう！</div>
      <div class="maid-avatar" id="maidAvatar">
        <img class="char-img maid-img" id="maidImage" src="img/maid/maid-idle.png" alt="黒髪セミロングでホワイトブリムをつけたデフォルメメイドキャラクター" width="185" height="260">
      </div>
    </div>

  </div><!-- /stage -->

  <!-- ── 入力エリア ── -->
  <div class="input-wrap">
    <div class="input-hint">▸ 今日達成したことを入力</div>
    <div class="input-row">
      <input type="text" id="doneInput" class="done-input"
        placeholder="例：企画書を完成させた、30分走った、読書した…" maxlength="200">
      <button id="doneBtn" class="done-btn">✓ Done!</button>
    </div>
  </div>

  <!-- ── Doneリスト ── -->
  <div class="list-wrap">
    <div class="list-header">
      <div class="list-title">▸ 積み上げリスト</div>
      <div class="list-count" id="listCount"></div>
    </div>
    <div class="done-list" id="doneList">
      <div class="empty-state">まだ何も積み上がっていません。<br>最初の一歩を踏み出しましょう！</div>
    </div>
    <div class="pagination" id="pagination" aria-label="Doneリストのページ切り替え"></div>
  </div>

</div><!-- /app -->

<!-- ── 編集モーダル ── -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">▸ 編集</div>
    <div class="modal-date" id="modalDate"></div>
    <textarea class="modal-textarea" id="modalInput" rows="3"></textarea>
    <div class="modal-btns">
      <button class="btn-del"    id="btnDel">削除</button>
      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-save"   id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- マイルストーントースト -->
<div class="toast" id="toast"></div>
<input type="file" id="importCsvInput" accept=".csv,text/csv" hidden>

<!-- ── スクリプト（依存順） ── -->
<script src="js/storage.js"></script>
<script src="js/speech.js"></script>
<script src="js/llm.js"></script>
<script src="js/pwa.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="js/drive-sync.js"></script>
<script src="js/app.js"></script>

</body>
</html>
