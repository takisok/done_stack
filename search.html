<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com https://content.googleapis.com; connect-src 'self' http://localhost:11434 http://127.0.0.1:11434 https://accounts.google.com https://apis.google.com https://www.googleapis.com https://content.googleapis.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; manifest-src 'self'; worker-src 'self'; frame-src https://accounts.google.com https://content.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self';">
  <title>Done Stack - 検索</title>
  <meta name="theme-color" content="#1f1f1f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Done Stack">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <a class="header-title header-link" href="index.html">Done Stack</a>
    <div class="header-tools">
      <form class="header-search" action="search.html" method="get" role="search">
        <input class="header-search-input" id="searchInput" type="search" name="q" placeholder="検索" aria-label="Doneを検索" data-i18n-placeholder="search" data-i18n-aria-label="searchAria">
      </form>
      <a class="menu-btn header-action" href="index.html" data-i18n="backToInput">入力へ戻る</a>
    </div>
  </div>
</header>

<main class="app search-app">
  <section class="history-hero">
    <div>
      <div class="history-kicker">Search</div>
      <h1 class="history-title" id="searchTitle" data-i18n="searchResults">検索結果</h1>
    </div>
  </section>

  <section class="history-summary search-summary" aria-label="検索サマリー">
    <div class="summary-main">
      <div class="summary-label">Matches</div>
      <div class="summary-number" id="matchTotal">0</div>
    </div>
    <div class="summary-grid">
      <div class="summary-item">
        <span class="summary-item-label" data-i18n="occurrences">出現回数</span>
        <strong id="occurrenceTotal">0回</strong>
      </div>
      <div class="summary-item">
        <span class="summary-item-label" data-i18n="activeDaysShort">活動日</span>
        <strong id="matchDays">0日</strong>
      </div>
      <div class="summary-item">
        <span class="summary-item-label" data-i18n="numbers">数値</span>
        <strong id="numberTotal">-</strong>
      </div>
    </div>
  </section>

  <section class="history-panel search-panel">
    <div class="panel-header">
      <h2 data-i18n="occurrences">出現回数</h2>
      <span id="occurrenceRange" data-i18n="daily">日別</span>
    </div>
    <div class="search-line-chart" id="occurrenceChart"></div>
  </section>

  <section class="history-panel search-panel" id="numberPanel" hidden>
    <div class="panel-header">
      <h2 data-i18n="numbers">数値</h2>
      <span data-i18n="numbersInDone">検索語を含むDone内の数値</span>
    </div>
    <div class="search-line-chart" id="numberChart"></div>
  </section>

  <section class="history-panel search-panel">
    <div class="panel-header">
      <h2 data-i18n="done">Done</h2>
      <span id="resultCount">0件</span>
    </div>
    <div class="search-result-list" id="resultList"></div>
  </section>
</main>

<script src="js/storage.js"></script>
<script src="js/i18n.js"></script>
<script src="js/pwa.js"></script>
<script src="vendor/echarts/echarts.min.js"></script>
<script src="js/search.js"></script>

</body>
</html>
